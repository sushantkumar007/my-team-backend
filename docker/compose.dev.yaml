name: myteam

services:
  mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - backend-network

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: ${ME_CONFIG_MONGODB_URL}
      ME_CONFIG_BASICAUTH_ENABLED: ${ME_CONFIG_BASICAUTH_ENABLED}
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD}
    networks:
      - backend-network

  backend-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    restart: always
    ports:
      - 3000:3000
    environment:
      PORT: ${PORT}
      CLIENT_URL: ${CLIENT_URL}
      MONGO_URL: ${MONGO_URL}
    depends_on:
      - mongo
    volumes:
      - ..:/app
      - /app/node_modules
    networks:
      - backend-network

volumes:
  mongo-data:

networks:
  backend-network:
